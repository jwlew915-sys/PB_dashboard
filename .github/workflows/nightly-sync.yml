name: Nightly Toast → Supabase Sync

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Specific date to sync (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''

jobs:
  sync:
    name: Sync Toast sales to Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run sync script
        env:
          TOAST_CLIENT_ID: ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_CLIENT_SECRET: ${{ secrets.TOAST_CLIENT_SECRET }}
          TOAST_RESTAURANT_GUID: ${{ secrets.TOAST_RESTAURANT_GUID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/sync-toast.js ${{ github.event.inputs.date }}
          else
            node scripts/sync-toast.js
          fi
